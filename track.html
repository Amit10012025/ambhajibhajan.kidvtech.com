<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📍 Live Bus Tracking — અંબાજી ભજન સંઘ્યા ૨૦૨૬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700&family=Noto+Serif+Gujarati:wght@600;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyBGKqJFln_9gr2reRydvlTmp6vxa8P0dZI",
  authDomain:"ambaji-bhajan-mandal.firebaseapp.com",
  projectId:"ambaji-bhajan-mandal"
};
const db = getFirestore(initializeApp(cfg));

// STATUS CONFIG
const STATUSES = [
  { key:'waiting',   gu:'⏳ અમદાવાદ — પ્રતીક્ષામાં',   en:'Waiting in Ahmedabad', color:'#8a7d60', bg:'rgba(138,125,96,.12)', border:'rgba(138,125,96,.3)' },
  { key:'departed',  gu:'🚀 અમદાવાદથી નીકળ્યા',         en:'Departed from Ahmedabad', color:'#e67e22', bg:'rgba(230,126,34,.12)', border:'rgba(230,126,34,.3)' },
  { key:'enroute',   gu:'🛣️ રસ્તામાં — અંબાજી તરફ',     en:'On the way to Ambaji', color:'#f1c40f', bg:'rgba(241,196,15,.12)', border:'rgba(241,196,15,.3)' },
  { key:'arrived',   gu:'🏔️ અંબાજી પહોંચ્યા',           en:'Arrived at Ambaji', color:'#2ecc71', bg:'rgba(46,204,113,.12)', border:'rgba(46,204,113,.3)' },
  { key:'darshan',   gu:'🛕 દર્શન + ભોજન',               en:'Darshan & Meals', color:'#27ae60', bg:'rgba(39,174,96,.12)', border:'rgba(39,174,96,.3)' },
  { key:'returning', gu:'🔄 પાછા ફરી રહ્યા છે',          en:'Returning to Ahmedabad', color:'#3498db', bg:'rgba(52,152,219,.12)', border:'rgba(52,152,219,.3)' },
  { key:'reached',   gu:'🏠 ઘરે સહી-સલામત પહોંચ્યા',   en:'Safely Reached Home', color:'#9b59b6', bg:'rgba(155,89,182,.12)', border:'rgba(155,89,182,.3)' },
];

let tracking = {};  // busNumber → trackData
let buses    = {};  // busNumber → busData  
let mandals  = [];

// Realtime listeners
onSnapshot(collection(db,'bus_tracking'), snap => {
  tracking = {};
  snap.docs.forEach(d => { const x=d.data(); tracking[x.busNumber]=x; });
  renderBoard(); updateStatusCounts();
});
onSnapshot(collection(db,'buses'), snap => {
  buses = {};
  snap.docs.forEach(d => { const x=d.data(); buses[x.busNumber]=x; });
  renderBoard();
});
onSnapshot(collection(db,'bhajan_mandals'), snap => {
  mandals = snap.docs.map(d=>d.data());
  renderBoard();
});

// ─── UPDATE BUS STATUS (Incharge action) ───
window.showUpdatePanel = function() {
  document.getElementById('update-panel').classList.toggle('hidden');
};

window.updateBusStatus = async function() {
  const busNum = parseInt(document.getElementById('upd-bus').value);
  const statusKey = document.getElementById('upd-status').value;
  const note = (document.getElementById('upd-note').value||'').trim();

  if (!busNum || !statusKey) { showMsg('Bus number અને status પસંદ કરો', 'error'); return; }

  const btn = document.getElementById('upd-btn');
  btn.disabled = true; btn.textContent = '⏳ Saving...';

  try {
    await setDoc(doc(db,'bus_tracking','bus_'+busNum), {
      busNumber: busNum,
      status: statusKey,
      note: note,
      updatedAt: new Date().toISOString(),
      timestamp: Date.now()
    });
    showMsg(`✅ Bus ${busNum} — status update!`, 'success');
    document.getElementById('upd-note').value = '';
  } catch(e) {
    showMsg('Error: '+e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '✅ Status Update';
  }
};

function showMsg(msg, type) {
  const el = document.getElementById('upd-msg');
  el.textContent = msg;
  el.className = 'upd-msg ' + type;
  setTimeout(()=>{ el.textContent=''; el.className='upd-msg'; }, 3000);
}

// ─── RENDER TRACKING BOARD ───
window.renderBoard = function() {
  const filterStatus = document.getElementById('filter-status')?.value || '';
  const filterBus    = parseInt(document.getElementById('filter-bus-num')?.value || 0);

  const container = document.getElementById('track-grid');
  let html = '';
  let counts = {};
  STATUSES.forEach(s => counts[s.key] = 0);
  counts['_none'] = 0;

  for (let i = 1; i <= 60; i++) {
    const t = tracking[i];
    const b = buses[i] || {};
    const bMandals = mandals.filter(m => m.busNumber === i);
    const totalMem = bMandals.reduce((s,m)=>s+(m.memberCount||0),0);
    const villages = [...new Set(bMandals.map(m=>m.village).filter(Boolean))];
    const statusKey = t?.status || 'waiting';
    const st = STATUSES.find(s=>s.key===statusKey) || STATUSES[0];

    counts[statusKey] = (counts[statusKey]||0) + 1;

    if (filterStatus && filterStatus !== statusKey) continue;
    if (filterBus && filterBus !== i) continue;

    const timeAgo = t?.updatedAt ? formatAgo(t.updatedAt) : 'Not updated';

    html += `
      <div class="tcard" style="--st-color:${st.color};--st-bg:${st.bg};--st-border:${st.border};">
        <div class="tcard-head">
          <div class="tcard-num">🚌 Bus ${i}</div>
          <div class="tcard-status-badge">${st.gu.split(' ')[0]}</div>
        </div>
        <div class="tcard-status-text">${st.gu}</div>
        ${t?.note ? `<div class="tcard-note">"${t.note}"</div>` : ''}
        <div class="tcard-meta">
          <span>🕐 ${timeAgo}</span>
          ${b.parkingSpot ? `<span>🅿️ ${b.parkingSpot}</span>` : ''}
        </div>
        <div class="tcard-info">
          ${b.incharge1Name ? `<span>👤 ${b.incharge1Name}${b.incharge1Mobile?` <a href="tel:${b.incharge1Mobile}" class="tcall">📞</a>`:''}</span>` : '<span style="color:#555;">Incharge not set</span>'}
          ${villages.length ? `<span>📍 ${villages.slice(0,2).join(', ')}${villages.length>2?` +${villages.length-2}`:''}</span>` : ''}
        </div>
        ${bMandals.length ? `<div class="tcard-counts"><span class="tc-badge tc-m">${bMandals.length} મંડળ</span><span class="tc-badge tc-s">${totalMem} સભ્ય</span></div>` : ''}
        <button class="tcard-update-btn" onclick="quickUpdate(${i})">✏️ Status Update</button>
      </div>`;
  }

  container.innerHTML = html;
  updateStatusCounts(counts);
  document.getElementById('loading-track').style.display = 'none';
};

window.quickUpdate = function(busNum) {
  document.getElementById('upd-bus').value = busNum;
  document.getElementById('update-panel').classList.remove('hidden');
  document.getElementById('update-panel').scrollIntoView({behavior:'smooth', block:'center'});
  document.getElementById('upd-status').focus();
};

function updateStatusCounts(counts) {
  if (!counts) {
    counts = {};
    STATUSES.forEach(s => { counts[s.key] = Object.values(tracking).filter(t=>t.status===s.key).length; });
    counts['_none'] = 60 - Object.values(tracking).length;
  }
  const bar = document.getElementById('status-counts');
  if (!bar) return;
  bar.innerHTML = STATUSES.map(s => {
    const c = counts[s.key]||0;
    if (!c) return '';
    return `<div class="sc-item" style="--c:${s.color};">
      <span class="sc-num">${c}</span>
      <span class="sc-lbl">${s.gu.split(' ').slice(1).join(' ')}</span>
    </div>`;
  }).join('') + `<div class="sc-item" style="--c:#555;">
    <span class="sc-num">${60 - Object.values(tracking).length}</span>
    <span class="sc-lbl">Not Updated</span>
  </div>`;
}

function formatAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'Just now';
  if (m < 60) return m + ' min ago';
  const h = Math.floor(m/60);
  if (h < 24) return h + ' hr ago';
  return Math.floor(h/24) + ' day ago';
}
</script>

<style>
:root{
  --gold:#d4a843; --gold2:#f5c842; --dark:#080501; --white:#fff;
  --g300:#ccc5ae; --g500:#8a7d60; --g600:#5a5040;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans Gujarati',sans-serif;background:#07060200;color:var(--white);min-height:100vh;background:linear-gradient(180deg,#080501,#0a0803);}

/* HERO */
.hero{background:linear-gradient(180deg,#040302,#0a0805);border-bottom:1px solid rgba(212,168,67,.1);padding:0;}
.hero-inner{max-width:1100px;margin:0 auto;padding:52px 24px 52px;text-align:center;position:relative;}
.back-link{position:absolute;top:18px;left:20px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(212,168,67,.18);color:var(--g300);padding:7px 14px;border-radius:8px;text-decoration:none;font-size:12px;transition:all .2s;}
.back-link:hover{color:var(--gold2);background:rgba(212,168,67,.1);}
.live-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);color:#e74c3c;padding:5px 16px;border-radius:40px;font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:18px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#e74c3c;animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
.hero-title{font-family:'Noto Serif Gujarati',serif;font-size:clamp(24px,5vw,48px);font-weight:700;color:var(--gold2);margin-bottom:6px;}
.hero-sub{font-size:13px;color:var(--g300);margin-bottom:28px;}

/* STATUS COUNTS BAR */
.sc-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:4px;}
.sc-item{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-top:3px solid var(--c);border-radius:10px;padding:10px 16px;min-width:80px;}
.sc-num{font-size:22px;font-weight:700;color:var(--c);line-height:1;}
.sc-lbl{font-size:10px;color:var(--g500);margin-top:4px;text-align:center;}

/* UPDATE PANEL */
.update-panel{max-width:560px;margin:24px auto 0;background:linear-gradient(135deg,#0f0a04,#140e06);border:1px solid rgba(212,168,67,.2);border-radius:16px;overflow:hidden;}
.update-panel.hidden{display:none;}
.upanel-head{background:rgba(212,168,67,.08);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(212,168,67,.12);}
.upanel-head h3{font-size:15px;font-weight:700;color:var(--gold2);}
.upanel-body{padding:20px;}
.upanel-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px;}
.fg label{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;}
.fg select,.fg input{padding:10px 13px;border:1.5px solid rgba(212,168,67,.2);border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:#0a0700;color:var(--white);transition:border-color .2s;}
.fg select:focus,.fg input:focus{border-color:var(--gold);}
.upd-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);border:none;padding:10px 22px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.upd-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,168,67,.4);}
.upd-btn:disabled{opacity:.6;cursor:default;}
.upd-msg{font-size:13px;min-height:20px;margin-top:10px;font-weight:600;}
.upd-msg.success{color:#2ecc71;}
.upd-msg.error{color:#e74c3c;}
.toggle-upd{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);border:none;padding:10px 22px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;margin:0 auto;transition:all .2s;}
.toggle-upd:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(212,168,67,.4);}

/* FILTER BAR */
.filter-bar{background:var(--white);border-radius:14px;box-shadow:0 6px 32px rgba(0,0,0,.2);padding:16px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;max-width:1100px;margin:-22px auto 28px;position:relative;z-index:10;}
.fsel{padding:9px 13px;border:1.5px solid #e0d8c8;border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:var(--white);min-width:140px;cursor:pointer;color:#333;}
.fsel:focus{border-color:var(--gold);}
.fbadge{background:#fdf6e3;color:var(--gold);border:1px solid #e8d090;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;margin-left:auto;}

/* TRACKING GRID */
.content{max-width:1100px;margin:0 auto;padding:0 20px 60px;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}

/* TRACK CARD */
.tcard{
  background:linear-gradient(145deg,#100c06,#0a0803);
  border:1px solid rgba(255,255,255,.07);
  border-left:5px solid var(--st-color);
  border-radius:14px; overflow:hidden; transition:all .25s;
  display:flex; flex-direction:column;
}
.tcard:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5);border-color:rgba(255,255,255,.12);}
.tcard-head{background:rgba(0,0,0,.3);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);}
.tcard-num{font-family:'Noto Serif Gujarati',serif;font-size:17px;font-weight:700;color:var(--gold2);}
.tcard-status-badge{background:var(--st-bg);color:var(--st-color);border:1px solid var(--st-border);padding:3px 10px;border-radius:20px;font-size:16px;}
.tcard-status-text{font-size:13px;font-weight:700;color:var(--st-color);padding:10px 14px 4px;line-height:1.4;}
.tcard-note{font-size:12px;color:var(--g300);padding:0 14px 6px;font-style:italic;}
.tcard-meta{display:flex;gap:10px;flex-wrap:wrap;padding:4px 14px 8px;border-bottom:1px solid rgba(255,255,255,.05);}
.tcard-meta span{font-size:11px;color:var(--g500);}
.tcard-info{padding:8px 14px;display:flex;flex-direction:column;gap:4px;flex:1;}
.tcard-info span{font-size:12px;color:var(--g300);}
.tcall{color:var(--gold);text-decoration:none;font-size:11px;background:rgba(212,168,67,.1);padding:1px 6px;border-radius:8px;}
.tcard-counts{display:flex;gap:6px;padding:6px 14px 8px;flex-wrap:wrap;}
.tc-badge{padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;}
.tc-m{background:rgba(212,168,67,.1);color:var(--gold2);border:1px solid rgba(212,168,67,.2);}
.tc-s{background:rgba(46,204,113,.1);color:#2ecc71;border:1px solid rgba(46,204,113,.2);}
.tcard-update-btn{margin:6px 14px 14px;background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.15);color:var(--g300);padding:8px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;text-align:center;}
.tcard-update-btn:hover{background:rgba(212,168,67,.15);color:var(--gold2);border-color:rgba(212,168,67,.3);}

/* LOADING */
#loading-track{text-align:center;padding:60px;color:var(--g500);grid-column:1/-1;}
.spin{font-size:36px;animation:spin 1.2s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LEGEND */
.legend{max-width:1100px;margin:0 auto 24px;padding:0 20px;}
.legend-inner{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 18px;}
.legend-title{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.legend-grid{display:flex;flex-wrap:wrap;gap:8px;}
.leg-item{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);padding:4px 10px;border-radius:20px;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-text{font-size:12px;color:var(--g300);}

/* FOOTER */
.footer{background:rgba(0,0,0,.3);border-top:1px solid rgba(212,168,67,.08);text-align:center;padding:24px;font-size:13px;color:var(--g500);}
.footer a{color:var(--gold);text-decoration:none;}
.footer strong{color:var(--gold2);}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#080501;}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,.3);border-radius:3px;}

/* MOBILE */
@media(max-width:768px){
  .hero-inner{padding:50px 16px 44px;}
  .sc-bar{gap:6px;}
  .sc-item{padding:8px 12px;min-width:64px;}
  .sc-num{font-size:18px;}
  .filter-bar{margin:-16px 14px 20px;padding:12px;gap:8px;flex-direction:column;}
  .fsel{width:100%;}
  .fbadge{margin-left:0;}
  .content{padding:0 12px 48px;}
  .tgrid{grid-template-columns:1fr;}
  .update-panel{margin:20px 14px 0;}
  .upanel-row{flex-direction:column;}
}
</style>
</head>

<script>
// ─ Populate dropdowns from STATUSES config (non-module) ─
const STATUSES_JS = [
  {key:'waiting',   gu:'⏳ અમદાવાદ — પ્રતીક્ષામાં',  color:'#8a7d60'},
  {key:'departed',  gu:'🚀 અમદાવાદથી નીકળ્યા',        color:'#e67e22'},
  {key:'enroute',   gu:'🛣️ રસ્તામાં — અંબાજી તરફ',    color:'#f1c40f'},
  {key:'arrived',   gu:'🏔️ અંબાજી પહોંચ્યા',          color:'#2ecc71'},
  {key:'darshan',   gu:'🛕 દર્શન + ભોજન',              color:'#27ae60'},
  {key:'returning', gu:'🔄 પાછા ફરી રહ્યા છે',         color:'#3498db'},
  {key:'reached',   gu:'🏠 ઘરે સહી-સલામત',            color:'#9b59b6'},
];

// Bus number dropdown
const updBusSel = document.getElementById('upd-bus');
const filterBusSel = document.getElementById('filter-bus-num');
for (let i=1;i<=60;i++) {
  [updBusSel, filterBusSel].forEach(sel => {
    const o = document.createElement('option'); o.value=i; o.textContent='Bus '+i; sel.appendChild(o);
  });
}

// Status dropdowns
const updStatusSel = document.getElementById('upd-status');
const filterStatusSel = document.getElementById('filter-status');
STATUSES_JS.forEach(s => {
  const o1=document.createElement('option'); o1.value=s.key; o1.textContent=s.gu; updStatusSel.appendChild(o1);
  const o2=document.createElement('option'); o2.value=s.key; o2.textContent=s.gu; filterStatusSel.appendChild(o2);
});

// Legend
const legendGrid = document.getElementById('legend-grid');
STATUSES_JS.forEach(s => {
  legendGrid.innerHTML += `<div class="leg-item"><div class="leg-dot" style="background:${s.color};"></div><span class="leg-text">${s.gu}</span></div>`;
});
</script>
</body>
</html>
